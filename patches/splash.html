<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setting up borealfox...</title>
    <style>
        body {
            background-color: #1c1b22;
            color: #eee;
            font-family: 'DejaVu Sans Mono', monospace, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: #ffffff;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #41404c;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #057;
            border-radius: 3px;
            animation: progress 20s linear forwards;
            box-shadow: 0 0 10px rgba(0, 85, 119, 0.5);
        }

        .spinner {
            margin-top: 40px;
            width: 24px;
            height: 24px;
            border: 3px solid #41404c;
            border-top: 3px solid #057;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes progress {
            0% { width: 0%; }
            10% { width: 15%; }
            40% { width: 35%; }
            60% { width: 75%; }
            90% { width: 90%; }
            100% { width: 100%; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        h1 {
            animation: pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>setting up borealfox</h1>
        <p>loading extensions and theme...</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="spinner"></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setting up borealfox...</title>
    <style>
        body {
            background-color: #1c1b22;
            color: #eee;
            font-family: 'DejaVu Sans Mono', monospace, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: #ffffff;
            animation: pulse 2s infinite ease-in-out;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #41404c;
            border-top: 3px solid #057;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>setting up borealfox</h1>
        <p>loading extensions and theme...</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
